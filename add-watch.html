<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Add Watch — Green Dial</title><link rel="stylesheet" href="css/styles.css"></head><body><div id="nav"></div><main><section class="section"><div class="container grid grid2"><div><div class="eyebrow">List your piece</div><h1 class="title">Add a real watch.</h1><p class="lead">This form creates a real listing in your browser for now. Later, this connects to database login, user accounts, and public marketplace listings.</p></div><form id="watchForm" class="card form"><div class="form-row"><input name="brand" placeholder="Brand e.g. Rolex" required><input name="model" placeholder="Model e.g. Submariner" required></div><div class="form-row"><input name="reference" placeholder="Reference number"><input name="year" placeholder="Year"></div><div class="form-row"><input name="price" type="number" placeholder="Price CAD" required><input name="city" placeholder="City / area e.g. Montréal" required></div><div class="form-row"><select name="condition"><option>Excellent</option><option>Very Good</option><option>Good</option><option>Fair</option></select><select name="box"><option>Box & Papers</option><option>Box Only</option><option>Papers Only</option><option>Watch Only</option></select></div><input name="photo" type="file" accept="image/*"><textarea name="description" placeholder="Describe condition, service history, reason for selling, meet-up preferences..."></textarea><button class="btn green" type="submit">Publish Listing</button></form></div></section></main><div id="footer"></div><script src="js/app.js"></script></body></html>
